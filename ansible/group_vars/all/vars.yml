# Balruno Ansible group variables (applied to every host).
# Secrets live in group_vars/vault.yml (ansible-vault encrypted).
#
# Source of truth: docs/backend/decisions/0007-infrastructure.md v1.1

# ─── OCI public IPs (override via vault.yml if rotated) ──────────────────
prod_app_public_ip: "168.107.47.33"
monitor_public_ip:  "168.107.10.100"
backup_public_ip:   "134.185.108.159"
status_public_ip:   "158.179.162.44"

# ─── OCI private IPs (same VCN, 10.0.0.0/24) ─────────────────────────────
prod_app_private_ip: "10.0.0.11"
monitor_private_ip:  "10.0.0.248"
backup_private_ip:   "10.0.0.81"
status_private_ip:   "10.0.0.182"

# ─── SSH ─────────────────────────────────────────────────────────────────
ssh_user_arm: "rocky"          # default user on OCI Rocky Linux 9 ARM image
ssh_user_x86: "rocky"          # default user on OCI Rocky Linux 9 x86 image
ssh_key_path: "~/.ssh/oci_key" # operator's combined OCI key

# ─── Domains ─────────────────────────────────────────────────────────────
domain_root: "balruno.com"
api_domain: "api.balruno.com"
collab_domain: "collab.balruno.com"
status_domain: "status.balruno.com"
monitor_domain: "monitor.balruno.com"

# ─── Pinned versions ─────────────────────────────────────────────────────
postgres_version: "18"      # PG 18 GA 2025-09. UUIDv7 native + async I/O + skip-scan.
java_version: "25"
spring_boot_version: "4.1.0"
node_version: "22"             # Hocuspocus runtime
nginx_version: "1.26"
grafana_version: "11.4.0"
loki_version: "3.3.0"
alloy_version: "1.5.0"
prometheus_version: "3.0.0"
alertmanager_version: "0.27.0"
influxdb_version: "2.7.10"
blackbox_exporter_version: "0.27.0"   # Replaces Uptime Kuma — Prom-native, fits Grafana stack.
cloudflared_version: "latest"

# ─── Backup (3-2-1 rule, ADR 0007 v1.1 §3.5) ─────────────────────────────
backup_retention_days: 7        # backup host local disk
object_storage_retention_days: 30
backup_cron_hour: 3             # daily 03:00 (monitor → backup rsync)
object_storage_cron_hour: 5     # daily 05:00 (backup → status → Object Storage upload)
oci_object_storage_region: "ap-seoul-1"  # Stage 0. Cross-region kicks in at Stage 2 (paying users).
oci_object_storage_bucket: "balruno-backup"

# ─── JVM / PG fail-safe defaults (Stage 0, ADR 0007 v1.1 §3.8) ───────────
spring_boot_mem_limit: "2g"
spring_jvm_options: "-XX:MaxRAMPercentage=75 -XX:+UseContainerSupport"
postgres_shared_buffers: "1GB"
postgres_effective_cache_size: "3GB"
postgres_work_mem: "16MB"
postgres_maintenance_work_mem: "256MB"
postgres_max_connections: 100
hocuspocus_mem_limit: "512m"
nginx_mem_limit: "256m"

# ─── Monitoring stack (Stage 0, ADR 0007 §3.1) ───────────────────────────
prometheus_retention_days: 7
prometheus_scrape_interval: "15s"
loki_retention_period: "168h"  # 7d
loki_ingestion_rate_mb: 4

# ─── Cloudflare ──────────────────────────────────────────────────────────
cloudflare_proxy_enabled: true
# Tunnel/Access secrets live in vault.yml.

# ─── Stage (ADR 0010 — progressive evolution triggers) ───────────────────
current_stage: 0  # 0: beta 0–10 users, 1: 50–100, 2: paying users, 3: 500+, 4: 5K+
