# spring-boot role — Java 25 runtime + balruno user + systemd unit on prod_app.
# JAR delivery happens out-of-band (GH Actions backend-deploy.yml), so this
# role finishes with the systemd unit *enabled* but possibly *not running*
# (it's running iff a JAR has already been delivered at sb_jar_path).

- name: Install Adoptium yum repo (Eclipse Temurin)
  ansible.builtin.yum_repository:
    name: adoptium
    description: Adoptium (Eclipse Temurin) RPM repo
    baseurl: "https://packages.adoptium.net/artifactory/rpm/rocky/$releasever/$basearch"
    gpgcheck: true
    gpgkey: https://packages.adoptium.net/artifactory/api/gpg/key/public
    enabled: true

- name: Install JDK 25 (Eclipse Temurin)
  ansible.builtin.dnf:
    name: "{{ sb_jdk_package }}"
    state: present

- name: Create balruno system user
  ansible.builtin.user:
    name: "{{ sb_user }}"
    system: true
    shell: /sbin/nologin
    home: /var/lib/{{ sb_user }}
    create_home: true
    state: present

- name: Create install dir
  ansible.builtin.file:
    path: "{{ sb_install_dir }}"
    state: directory
    owner: "{{ sb_user }}"
    group: "{{ sb_user }}"
    mode: '0750'

- name: Create log dir
  ansible.builtin.file:
    path: "{{ sb_log_dir }}"
    state: directory
    owner: "{{ sb_user }}"
    group: "{{ sb_user }}"
    mode: '0750'

- name: Render systemd unit
  ansible.builtin.template:
    src: balruno-backend.service.j2
    dest: "/etc/systemd/system/{{ sb_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart balruno-backend

- name: Enable balruno-backend service
  ansible.builtin.systemd:
    name: "{{ sb_service_name }}"
    enabled: true
    daemon_reload: true

# Note: not started here. Service is started after the first JAR delivery
# by the GH Actions backend-deploy.yml workflow.
