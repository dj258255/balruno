# Defaults for the spring-boot role (prod_app host).
# Provisions the runtime — JDK 25, dedicated user, install dir, systemd unit.
# The actual JAR is *not* deployed by Ansible; the backend-deploy.yml GitHub
# Actions workflow handles JAR delivery (build → scp → systemctl restart).
# Ansible owns the immutable infra; CI owns the artifact lifecycle.

sb_user: balruno
sb_install_dir: /opt/balruno/backend
sb_jar_path: "{{ sb_install_dir }}/app.jar"
sb_log_dir: /var/log/balruno
sb_service_name: balruno-backend

# Java 25 (LTS) from Eclipse Temurin via the official Adoptium yum repo.
sb_jdk_package: temurin-25-jdk

# JVM options. Container-style memory percentage — host has 11GB usable, give
# Spring 2GB max so the JVM doesn't compete with PG/Hocuspocus eventually
# co-located. ADR 0007 v1.1 §3.8 fail-safe defaults.
sb_jvm_opts: >-
  -XX:MaxRAMPercentage=20
  -XX:+UseG1GC
  -XX:+HeapDumpOnOutOfMemoryError
  -XX:HeapDumpPath={{ sb_log_dir }}/heapdump.hprof
  -Dfile.encoding=UTF-8

# Spring profile activated by systemd unit at runtime.
sb_active_profile: prod
