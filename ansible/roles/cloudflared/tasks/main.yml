# cloudflared role — Cloudflare Tunnel daemon on the backup host.
# Provides public access to monitor.balruno.com → Grafana on monitor:3000
# without opening any inbound port (tunnel is outbound-only).

- name: Install Cloudflare yum repo
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflared-ascii.repo
    dest: /etc/yum.repos.d/cloudflared.repo
    owner: root
    group: root
    mode: '0644'

- name: Install cloudflared from Cloudflare's repo
  ansible.builtin.dnf:
    name: cloudflared
    state: present
  register: cloudflared_install

- name: Check if cloudflared service is already configured
  ansible.builtin.stat:
    path: /etc/systemd/system/cloudflared.service
  register: cloudflared_unit

- name: Install cloudflared service (one-time, runs the connector with the tunnel token)
  ansible.builtin.command:
    cmd: "cloudflared service install {{ cloudflared_tunnel_token }}"
  when: not cloudflared_unit.stat.exists
  no_log: true   # tunnel token is a vault secret — never echo to apply log
  changed_when: true

- name: Ensure cloudflared service is enabled + running
  ansible.builtin.systemd:
    name: "{{ cloudflared_service }}"
    enabled: true
    state: started
    daemon_reload: true
