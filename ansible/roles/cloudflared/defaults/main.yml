# Defaults for the cloudflared role.
# Runs on the backup host. Cloudflare Tunnel daemon proxies the public
# monitor.balruno.com URL through Cloudflare's network into our private
# VCN, hitting the Grafana container on the monitor host.

# Cloudflared is installed via the RPM from cloudflare's GitHub releases —
# the dnf repo at pkg.cloudflare.com works too but the direct .rpm is one
# fewer moving part and pinned-version friendly.
cloudflared_release_arch: "{{ 'arm64' if arch == 'arm64' else 'amd64' }}"
cloudflared_rpm_url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-{{ cloudflared_release_arch }}.rpm"

# Tunnel install token. Vault var, must be filled before this role runs.
cloudflared_tunnel_token: "{{ vault_cloudflare_tunnel_token }}"

# systemd unit name created by `cloudflared service install`.
cloudflared_service: cloudflared
