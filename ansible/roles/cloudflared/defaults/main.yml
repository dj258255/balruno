# Defaults for the cloudflared role.
# Runs on prod_app (single-host layout, 2026-07-06). Cloudflare Tunnel
# daemon proxies the public monitor.balruno.com URL through Cloudflare's
# network to the Grafana container on the same host. The tunnel's ingress
# upstream is dashboard-managed and must point at 10.0.0.11:3000.

# Cloudflared is installed from Cloudflare's official yum repo.
# (GitHub releases don't ship .rpm artifacts; the pkg.cloudflare.com repo is
# the supported install path on RHEL/Rocky.)

# Tunnel install token. Vault var, must be filled before this role runs.
cloudflared_tunnel_token: "{{ vault_cloudflare_tunnel_token }}"

# systemd unit name created by `cloudflared service install`.
cloudflared_service: cloudflared
