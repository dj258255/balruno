# Common baseline applied to every OCI host.
# ADR 0007 v1.1 §3.7 — swap, SSH hardening, fail2ban, optional Docker.

- import_tasks: packages.yml
  tags: [common, packages]

- import_tasks: timezone.yml
  tags: [common, timezone]

- import_tasks: swap.yml
  tags: [common, swap]

- import_tasks: ssh-hardening.yml
  tags: [common, ssh]

- import_tasks: firewall.yml
  tags: [common, firewall]

- import_tasks: fail2ban.yml
  tags: [common, fail2ban]

- import_tasks: docker.yml
  when: common_install_docker | bool
  tags: [common, docker]
