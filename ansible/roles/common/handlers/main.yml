# Service restart handlers used by tasks that change configuration.

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
