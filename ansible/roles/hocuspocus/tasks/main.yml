# hocuspocus role — host prep for the Docker-based collab server on prod_app.
# Docker engine itself is installed by the common role (when
# common_install_docker is true on this host).

- name: Ensure /opt/balruno parent dir is traversable
  # Already created by the backend role on the same host, but the task
  # is idempotent so leaving it here keeps the role self-contained when
  # invoked in isolation (--tags hocuspocus).
  ansible.builtin.file:
    path: /opt/balruno
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure collab install dir exists
  ansible.builtin.file:
    path: "{{ hocuspocus_install_dir }}"
    state: directory
    owner: root
    group: docker      # so 'docker compose ...' commands run by rocky (in docker grp) work
    mode: '0775'

- name: Render .env (POSTGRES_*, COLLAB_TOKEN_SECRET)
  # 0640 root:docker — same pattern as the backend role. docker compose
  # is invoked by 'rocky' (in docker group) and the compose CLI itself
  # parses env_file, so docker group members need read access.
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ hocuspocus_env_file }}"
    owner: root
    group: docker
    mode: '0640'
  no_log: true   # don't echo secret-laced template diff to the run log
  notify: restart collab stack

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ hocuspocus_compose_file }}"
    owner: root
    group: docker
    mode: '0664'
  notify: restart collab stack
