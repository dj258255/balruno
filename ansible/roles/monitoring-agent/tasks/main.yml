---
# monitoring-agent — per-host sidecars (node_exporter + cadvisor + alloy)
# deployed via a single Docker compose on every host.

# Migration cleanup — the predecessor `cadvisor` role and the central
# monitoring stack used to create stand-alone containers named `cadvisor`
# and `node-exporter`. Those would block `docker compose up` on the new
# compose stack because they share the container name. We drop them only
# if they exist *outside* a compose project (i.e. no compose label) — once
# the agent stack is live this script is a no-op.
- name: Migration cleanup — remove pre-compose cadvisor / node-exporter / alloy
  ansible.builtin.shell: |
    set -e
    for name in cadvisor node-exporter alloy; do
      if docker inspect "$name" >/dev/null 2>&1; then
        project=$(docker inspect "$name" --format '{{ "{{" }} index .Config.Labels "com.docker.compose.project" {{ "}}" }}' 2>/dev/null || echo "")
        if [ -z "$project" ] || [ "$project" = "balruno-monitoring" ]; then
          docker rm -f "$name" >/dev/null
          echo "removed:$name"
        fi
      fi
    done
  args:
    executable: /bin/bash
  register: migration_cleanup
  changed_when: "'removed:' in migration_cleanup.stdout"

- name: Ensure agent root directory
  ansible.builtin.file:
    path: "{{ monitoring_agent_root }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

# Persistent systemd journal — the journal mount alloy reads (/var/log/journal)
# is empty by default because Rocky 9 stores journal logs in /run (ramdisk).
# Creating /var/log/journal switches journald to persistent storage on next
# restart, so alloy actually has entries to forward.
- name: Enable persistent systemd journal
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: '2755'
  notify: restart journald

- name: Render agent docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_agent_compose_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: restart monitoring agent

# Alloy config is only rendered when this host runs alloy (backup + status
# skip alloy to keep their 1GB memory budget safe).
- name: Render alloy config
  ansible.builtin.template:
    src: alloy-config.alloy.j2
    dest: "{{ monitoring_agent_root }}/alloy-config.alloy"
    owner: root
    group: root
    mode: '0644'
  when: monitoring_agent_deploy_alloy
  notify: restart monitoring agent

- name: Allow agent ports from VCN private range (host firewall)
  ansible.posix.firewalld:
    rich_rule: 'rule family="ipv4" source address="10.0.0.0/24" port port="{{ item }}" protocol="tcp" accept'
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "{{ monitoring_agent_port_node_exporter }}"
    - "{{ monitoring_agent_port_cadvisor }}"
    - "{{ monitoring_agent_port_alloy }}"

- name: Pull agent images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ monitoring_agent_root }}"

- name: Start agent stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_agent_root }}"
    state: present
