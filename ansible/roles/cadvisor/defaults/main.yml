# Defaults for the cadvisor role.
# Runs on prod_app + monitor (hosts where Docker containers actually live).
# backup + status hosts are systemd-only — cAdvisor would have nothing to scrape.

cadvisor_image: "gcr.io/cadvisor/cadvisor:v0.49.1"
cadvisor_container_name: cadvisor

# Default 8080 collides with Spring on prod_app — using 9101 to stay clear.
cadvisor_host_port: 9101
cadvisor_container_port: 8080

# Bind to the private VCN IP so only Prometheus on monitor can scrape.
cadvisor_bind_address: "{{ private_ip | default(ansible_default_ipv4.address) }}"

cadvisor_mem_limit: "256m"
