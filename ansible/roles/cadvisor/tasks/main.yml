---
# cAdvisor — per-host container metrics for Prometheus.
# Runs on prod_app + monitor (hosts running Docker containers).

- name: Pull cAdvisor image
  community.docker.docker_image:
    name: "{{ cadvisor_image }}"
    source: pull

- name: Start cAdvisor container
  community.docker.docker_container:
    name: "{{ cadvisor_container_name }}"
    image: "{{ cadvisor_image }}"
    state: started
    restart_policy: unless-stopped
    privileged: true
    devices:
      - "/dev/kmsg:/dev/kmsg"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    ports:
      - "{{ cadvisor_bind_address }}:{{ cadvisor_host_port }}:{{ cadvisor_container_port }}"
    memory: "{{ cadvisor_mem_limit }}"
