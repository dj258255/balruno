# Restart / reload triggers for the monitoring stack.

- name: restart monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_root }}"
    state: restarted

- name: reload prometheus
  # SIGHUP alone is unreliable here because the prometheus.yml is delivered
  # via a *file* bind mount and Ansible's template module replaces it via
  # atomic rename — which leaves the container holding the stale inode.
  # A full container restart guarantees the new file is re-bound.
  community.docker.docker_container:
    name: prometheus
    state: started
    restart: true
  changed_when: true
