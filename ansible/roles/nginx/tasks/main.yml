# nginx role — TLS terminator + reverse proxy on prod_app host.
# Cert from Cloudflare Origin CA (15-year validity, no Let's Encrypt cron).

- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Ensure SELinux can let nginx connect to backend ports
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true

# ADR 0044 — main-context tweak. nginx -s reload during a WebSocket-heavy
# proxy (Hocuspocus) can leave old workers alive indefinitely while their
# WS connections persist. 30s caps the drain so old workers are forcibly
# shut down — yjs clients reconnect to the new worker via auto-retry.
- name: Set worker_shutdown_timeout in main nginx config
  ansible.builtin.lineinfile:
    path: /etc/nginx/nginx.conf
    insertafter: '^worker_processes\s'
    regexp: '^worker_shutdown_timeout\s'
    line: 'worker_shutdown_timeout 30s;'
    state: present
  notify: reload nginx

- name: Create cert directory
  ansible.builtin.file:
    path: "{{ nginx_cert_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy Cloudflare Origin Certificate
  ansible.builtin.copy:
    content: "{{ vault_cloudflare_origin_cert }}"
    dest: "{{ nginx_origin_cert_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Deploy Cloudflare Origin Private Key
  ansible.builtin.copy:
    content: "{{ vault_cloudflare_origin_key }}"
    dest: "{{ nginx_origin_key_path }}"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  notify: reload nginx

- name: Render top-level maps (loaded first via 00- prefix)
  ansible.builtin.template:
    src: maps.conf.j2
    dest: /etc/nginx/conf.d/00-maps.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Render Cloudflare real_ip include
  ansible.builtin.template:
    src: cloudflare-real-ip.conf.j2
    dest: /etc/nginx/conf.d/01-cloudflare-real-ip.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

# ADR 0044 — blue/green upstream snippets + active symlink. The deploy
# workflow flips the symlink at cutover; ansible only sets the initial
# active color on first apply (when the symlink does not yet exist).

- name: Ensure /etc/nginx/snippets directory exists
  ansible.builtin.file:
    path: /etc/nginx/snippets
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Render blue/green upstream snippets
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/nginx/snippets/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - upstream-balruno-backend-blue.conf
    - upstream-balruno-backend-green.conf
    - upstream-balruno-collab-blue.conf
    - upstream-balruno-collab-green.conf
  notify: reload nginx

- name: Stat active backend upstream symlink
  ansible.builtin.stat:
    path: /etc/nginx/conf.d/balruno-backend-active.conf
  register: backend_active_link

- name: Set initial active backend upstream symlink (first apply only)
  ansible.builtin.file:
    src: "/etc/nginx/snippets/upstream-balruno-backend-{{ nginx_initial_active_color }}.conf"
    dest: /etc/nginx/conf.d/balruno-backend-active.conf
    state: link
    force: true
  when: not backend_active_link.stat.exists
  notify: reload nginx

- name: Stat active collab upstream symlink
  ansible.builtin.stat:
    path: /etc/nginx/conf.d/balruno-collab-active.conf
  register: collab_active_link

- name: Set initial active collab upstream symlink (first apply only)
  ansible.builtin.file:
    src: "/etc/nginx/snippets/upstream-balruno-collab-{{ nginx_initial_active_color }}.conf"
    dest: /etc/nginx/conf.d/balruno-collab-active.conf
    state: link
    force: true
  when: not collab_active_link.stat.exists
  notify: reload nginx

- name: Render api.balruno.com vhost
  ansible.builtin.template:
    src: api.conf.j2
    dest: /etc/nginx/conf.d/api.balruno.com.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Render collab.balruno.com vhost
  ansible.builtin.template:
    src: collab.conf.j2
    dest: /etc/nginx/conf.d/collab.balruno.com.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Disable default nginx welcome vhost
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx

- name: Allow http + https in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - http
    - https

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Enable + start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
