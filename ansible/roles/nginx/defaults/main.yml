# Defaults for the nginx role (prod_app host).
# nginx terminates TLS with the Cloudflare Origin Certificate, then
# reverse-proxies to the local backend processes:
#   api.balruno.com    → 127.0.0.1:8080  (Spring Boot)
#   collab.balruno.com → 127.0.0.1:1234  (Hocuspocus, WS upgrade)

# Where to drop the cert pair. /etc/nginx/cert/ is dedicated and 0700.
nginx_cert_dir: /etc/nginx/cert
nginx_origin_cert_path: "{{ nginx_cert_dir }}/cloudflare-origin.crt"
nginx_origin_key_path: "{{ nginx_cert_dir }}/cloudflare-origin.key"

# Backend upstream targets. Bound to loopback because Cloudflare proxy is
# the only reachable inbound path; backends never expose to the VCN.
nginx_backend_spring_host: 127.0.0.1
nginx_backend_spring_port: 8080
nginx_backend_hocuspocus_host: 127.0.0.1
nginx_backend_hocuspocus_port: 1234

# Cloudflare published IPv4 ranges. real_ip_from sets the trusted proxy list
# so nginx logs and rate-limits use the real client IP from CF-Connecting-IP
# rather than the Cloudflare edge IP. Updated periodically from
# https://www.cloudflare.com/ips-v4
nginx_cloudflare_ipv4:
  - 173.245.48.0/20
  - 103.21.244.0/22
  - 103.22.200.0/22
  - 103.31.4.0/22
  - 141.101.64.0/18
  - 108.162.192.0/18
  - 190.93.240.0/20
  - 188.114.96.0/20
  - 197.234.240.0/22
  - 198.41.128.0/17
  - 162.158.0.0/15
  - 104.16.0.0/13
  - 104.24.0.0/14
  - 172.64.0.0/13
  - 131.0.72.0/22

nginx_cloudflare_ipv6:
  - 2400:cb00::/32
  - 2606:4700::/32
  - 2803:f800::/32
  - 2405:b500::/32
  - 2405:8100::/32
  - 2a06:98c0::/29
  - 2c0f:f248::/32

# Per-server limits. Stage 0 fail-safes — relax in Stage 1+ once we have
# real RPS numbers from k6.
nginx_client_max_body_size: "16m"
nginx_keepalive_timeout: "65s"
nginx_proxy_connect_timeout: "10s"
nginx_proxy_send_timeout: "60s"
nginx_proxy_read_timeout: "60s"
# Hocuspocus needs a longer read timeout for idle WS connections.
nginx_proxy_read_timeout_ws: "3600s"
