# uptime-kuma role — public status page on status.balruno.com.
#
# Requires the common role (Docker engine + Compose plugin) to have run first.
# That sets common_install_docker=true on the status host.

- name: Install docker Python SDK (community.docker module dependency)
  ansible.builtin.dnf:
    name: python3-pip
    state: present

- name: Install docker SDK via pip
  ansible.builtin.pip:
    name:
      - docker>=7.0.0
      - docker-compose>=1.29.0
    state: present

- name: Ensure uptime-kuma root directory exists
  ansible.builtin.file:
    path: "{{ uptime_kuma_root }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ uptime_kuma_compose_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: restart uptime-kuma

- name: Allow uptime-kuma port from VCN private range
  ansible.posix.firewalld:
    rich_rule: 'rule family="ipv4" source address="10.0.0.0/24" port port="{{ uptime_kuma_port }}" protocol="tcp" accept'
    permanent: true
    immediate: true
    state: enabled

- name: Pull uptime-kuma image
  community.docker.docker_compose_v2_pull:
    project_src: "{{ uptime_kuma_root }}"

- name: Start uptime-kuma
  community.docker.docker_compose_v2:
    project_src: "{{ uptime_kuma_root }}"
    state: present
