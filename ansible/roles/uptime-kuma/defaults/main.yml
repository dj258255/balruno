# Defaults for the uptime-kuma role (status host).
# Single-container deployment via docker compose for layout parity with the
# monitoring role.

uptime_kuma_root: /opt/balruno/uptime-kuma
uptime_kuma_compose_file: "{{ uptime_kuma_root }}/docker-compose.yml"

# Pinned image version comes from group_vars/all/vars.yml (uptime_kuma_version).
uptime_kuma_image: "louislam/uptime-kuma:{{ uptime_kuma_version }}"

# Port + bind address. We bind to the status host's VCN private IP — the
# Cloudflare Tunnel daemon (cloudflared role, status.balruno.com) will
# proxy this externally; direct public exposure is blocked at the OCI
# Security List + firewalld layer.
uptime_kuma_port: 3001
uptime_kuma_bind_address: "{{ status_private_ip }}"

# Memory cap — Uptime Kuma idles around 50-100MB and grows with monitor count.
# 256m headroom is plenty for the 5-10 monitors we'll run.
uptime_kuma_mem_limit: "256m"
