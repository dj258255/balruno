# Defaults for the backend role (prod_app host).
# Provisions Docker + a docker-compose.yml. The image itself is built and
# pushed to GHCR by .github/workflows/backend-deploy.yml; Ansible just owns
# the host config so 'docker compose pull && up -d' works.

backend_install_dir: /opt/balruno/backend
backend_compose_file: "{{ backend_install_dir }}/docker-compose.yml"
backend_env_file: "{{ backend_install_dir }}/.env"

# DB connection — Spring and PG 18 share prod_app, so the default is
# `private_ip` (the running host's own VCN address). PG listens on both
# the host's VCN IP and 127.0.0.1; the backend container reaches the
# VCN IP through the docker bridge gateway.
# Credential itself comes from vault.yml (vault_postgres_password).
backend_postgres_host: "{{ private_ip }}"
backend_postgres_port: "{{ postgres_port | default(5432) }}"
backend_postgres_db: "{{ postgres_db_name | default('balruno') }}"
backend_postgres_user: "{{ postgres_db_user | default('balruno') }}"

# Image lives at ghcr.io/<owner>/balruno-backend.
# Push tags both 'latest' (rolling) and the commit SHA (rollback target);
# prod pulls 'latest' by default.
backend_image_repo: "ghcr.io/dj258255/balruno-backend"
backend_image_tag: latest

# Container resource ceiling. ARM 12GB host — Spring Boot baseline ~190MB,
# 2GB ceiling gives headroom for WS connections + Hocuspocus extension once
# they land in B-4/B-5.
backend_mem_limit: "2g"
backend_active_profile: prod

# Blue/green deploy ports — ADR 0044. Spring listens on 8080 inside both
# containers; only the host-side mapping differs. nginx upstream switches
# between these via the snippet symlink swap.
backend_blue_host_port: 8080
backend_green_host_port: 8081
backend_container_port: 8080
