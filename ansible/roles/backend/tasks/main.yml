# backend role — host prep for the Docker-based backend deployment on prod_app.
# Docker engine itself is installed by the common role when
# common_install_docker is true (set on prod_app in site.yml).

- name: Ensure /opt/balruno parent dir is traversable
  # Parent was left at balruno:balruno 0750 by the previous spring-boot role.
  # rocky needs +x on every ancestor to cd into the backend dir for `docker compose`.
  ansible.builtin.file:
    path: /opt/balruno
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure backend install dir exists
  ansible.builtin.file:
    path: "{{ backend_install_dir }}"
    state: directory
    owner: root
    group: docker      # so 'docker compose ...' commands run by rocky (in docker grp) work
    mode: '0775'

- name: Render .env (POSTGRES_*, OAuth, JWT secrets)
  # 0640 root:docker — docker compose is invoked by 'rocky' (in docker
  # group) and the compose CLI itself parses env_file, so docker group
  # members need read access. Others 0 — sshd-allowed users not in the
  # docker group still can't see secrets.
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ backend_env_file }}"
    owner: root
    group: docker
    mode: '0640'
  no_log: true   # don't echo secret-laced template diff to the run log
  notify: restart backend stack

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ backend_compose_file }}"
    owner: root
    group: docker
    mode: '0664'
  notify: restart backend stack

- name: Allow rocky user to run docker (group membership)
  ansible.builtin.user:
    name: rocky
    groups: docker
    append: true
