# Handler intentionally left empty — ADR 0044.
#
# Under blue/green deploy the active container set is determined by the
# deploy workflow (which color, which image SHA), not by Ansible. Ansible
# only renders compose.yml + .env on disk; the workflow handles `docker
# compose up -d <service>`, readiness polling, and the nginx cutover.
#
# A naive `docker_compose_v2` handler with state=restarted would either
# (a) skip both services because they sit behind COMPOSE_PROFILES, or
# (b) try to bring up both colors at once (RAM blowout). Either is wrong,
# so we leave the lifecycle to the workflow.
