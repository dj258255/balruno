# Provision a dedicated SSH key on the status host so the upload daemon can
# rsync from backup. The pubkey is delegated onto the backup host's rocky user
# authorized_keys via Ansible's delegate_to, so the operator doesn't need to
# copy keys by hand.

- name: Ensure .ssh dir exists (must precede openssh_keypair, which doesn't create parents)
  ansible.builtin.file:
    path: "{{ osu_home }}/.ssh"
    state: directory
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0700'

- name: Generate SSH key pair for the upload daemon (status side)
  community.crypto.openssh_keypair:
    path: "{{ osu_home }}/.ssh/id_ed25519"
    type: ed25519
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0600'
    state: present
  register: osu_keypair

# known_hosts pre-seeding removed: lookup('pipe', ssh-keyscan ...) executes
# on the Ansible controller, but the CI runner can't reach the VCN private
# IP. The upload script uses StrictHostKeyChecking=accept-new instead, which
# auto-pins the host key on first connection and stays strict thereafter —
# safe for scripted intra-VCN access where MITM requires control of OCI.

- name: Authorize the upload daemon's pubkey on the backup host (rocky user)
  delegate_to: backup
  ansible.posix.authorized_key:
    user: "{{ osu_remote_user }}"
    state: present
    key: "{{ osu_keypair.public_key }}"
    comment: "balruno-backup uploader (status host)"
    # Stage 0 hardening: disable everything but the rsync we need. Stage 1+
    # trigger: wrap with rrsync to bind to one path read-only.
    key_options: 'no-agent-forwarding,no-port-forwarding,no-pty,no-X11-forwarding,no-user-rc'
