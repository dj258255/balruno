# R2 credentials for the AWS CLI. Stored under the daemon user's HOME so a
# different process on this host can't read them. mode 0600.

- name: Render ~/.aws/credentials (R2 access keys)
  ansible.builtin.template:
    src: aws-credentials.j2
    dest: "{{ osu_home }}/.aws/credentials"
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0600'
  no_log: true   # never echo credentials, even in --diff

- name: Render ~/.aws/config (default region + endpoint)
  ansible.builtin.template:
    src: aws-config.j2
    dest: "{{ osu_home }}/.aws/config"
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0600'

- name: Ensure ~/.aws dir mode
  ansible.builtin.file:
    path: "{{ osu_home }}/.aws"
    state: directory
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0700'
