# Dedicated system user for the upload daemon. Non-login shell, locked
# password — only Ansible-installed cron entries or sudo can execute as it.
#
# `groups: rocky` is the post-2026-05-21 consolidation requirement: the
# upload script now reads the local backup dir (owned by rocky:rocky,
# mode 0750) so the daemon user needs to be in the rocky group to enter.

- name: Create system user for backup uploader
  ansible.builtin.user:
    name: "{{ osu_user }}"
    system: true
    shell: /sbin/nologin
    home: "{{ osu_home }}"
    create_home: true
    groups: rocky
    append: true
    state: present

- name: Ensure staging directory exists
  ansible.builtin.file:
    path: "{{ osu_staging_dir }}"
    state: directory
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0700'

- name: Ensure log directory exists
  ansible.builtin.file:
    path: /var/log/balruno
    state: directory
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0750'
