# Dedicated system user for the upload daemon. Non-login shell, locked
# password — only Ansible-installed cron entries or sudo can execute as it.
#
# `groups: postgres` is the single-host (2026-07-06) requirement: the
# upload script reads the local backup dir (owned by postgres:postgres,
# mode 0750) so the daemon user needs to be in the postgres group to enter.

- name: Create system user for backup uploader
  ansible.builtin.user:
    name: "{{ osu_user }}"
    system: true
    shell: /sbin/nologin
    home: "{{ osu_home }}"
    create_home: true
    groups: postgres
    append: true
    state: present

- name: Ensure staging directory exists
  ansible.builtin.file:
    path: "{{ osu_staging_dir }}"
    state: directory
    owner: "{{ osu_user }}"
    group: "{{ osu_user }}"
    mode: '0700'

# Shared log dir — same declaration as the backup role (see dump.yml) so
# repeated applies don't flip ownership between the two roles.
- name: Ensure log directory exists
  ansible.builtin.file:
    path: /var/log/balruno
    state: directory
    owner: root
    group: postgres
    mode: '0775'
