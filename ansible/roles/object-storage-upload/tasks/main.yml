# object-storage-upload role — daily pg_dump → Cloudflare R2 (3-2-1 offsite).
#
# Flow (post-2026-07-06 single-host consolidation, runs on prod_app):
#   05:00 UTC daily:
#     1. Find newest pg_dump in {{ osu_source_dir }} (local file, same host)
#     2. aws s3 cp the file to s3://{r2_bucket}/daily/YYYY-MM-DD/...
#     3. (No copy / no SSH — backup role's retention cron handles old files)
#
# All steps run as a non-root system user (balruno-backup, member of the
# postgres group so it can read /var/backups/postgres). The user has its
# own ~/.aws/ credentials for R2.

- import_tasks: user.yml
  tags: [object-storage, user]

- import_tasks: awscli.yml
  tags: [object-storage, awscli]

- import_tasks: credentials.yml
  tags: [object-storage, credentials]

- import_tasks: script.yml
  tags: [object-storage, script]

- import_tasks: cron.yml
  tags: [object-storage, cron]
