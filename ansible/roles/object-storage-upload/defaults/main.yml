# Defaults for the object-storage-upload role.
# Reads daily pg_dumps from the backup role's local dir on the same host
# and uploads them to Cloudflare R2 (3-2-1 offsite copy).
#
# History: status host (pull over SSH) → merged into backup 2026-05-21 →
# merged into prod_app 2026-07-06 (single-host layout). The chain is now
# 2 hops: prod_app local dump → R2.

# Local user that owns the upload script + cron entry. Created if absent.
osu_user: balruno-backup
osu_home: /var/lib/{{ osu_user }}

# Where pg_dumps land — same dir the backup role dumps into.
osu_source_dir: "{{ backup_dir | default('/var/backups/postgres') }}"

# Local staging dir — retained for compatibility with the legacy script
# layout (the cleanup find still uses it as a no-op).
osu_staging_dir: "{{ osu_home }}/staging"

# R2 bucket layout: daily/YYYY-MM-DD/balruno.sql.gz
osu_r2_bucket: "{{ r2_bucket }}"
osu_r2_endpoint: "{{ r2_endpoint }}"
osu_r2_prefix: "daily"

# Cron schedule (host TZ = UTC, ADR 0007 §3.7). Runs 2h after the backup
# role's 03:00 dump so the file is always settled by upload time.
osu_cron_minute: 0
osu_cron_hour: "{{ object_storage_cron_hour }}"   # default 5 (UTC) — see all/vars.yml

# AWS CLI v2 — used for S3-compatible R2 upload.
# Install via the official zip bundle to get the Rocky 9 x86_64 / aarch64 binary.
osu_awscli_version: "2.31.13"
