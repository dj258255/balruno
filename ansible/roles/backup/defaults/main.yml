# Defaults for the backup role — runs on prod_app only.
# Single-host layout (2026-07-06): pg_dump lands on local disk, the
# object-storage-upload role ships it to R2. No cross-host rsync.

backup_dir: /var/backups/postgres

# Dump runs as the postgres OS user (peer auth, no password).
backup_user: postgres
backup_script: /usr/local/bin/balruno-backup.sh

# Local retention window + cron hour come from group_vars/all/vars.yml
# (backup_retention_days=7, backup_cron_hour=3). R2 offsite does its own
# 30-day retention via bucket lifecycle.
backup_cron_minute: 0

# pg_dump options. --format=custom would be richer (parallel restore, selective)
# but plain text + gzip is simpler for a small DB and easier for ad-hoc inspection.
backup_db_name: balruno
backup_db_user: postgres
