# backup role — runs on both prod_app (source) and backup (target).
# Branches by inventory_hostname so the two halves stay in one role + one
# code path; the source/target ordering is controlled in site.yml.
#
# Pre-2026-05-21 the source side ran on monitor (where PG lived). After
# the monitor→prod_app consolidation PG runs on prod_app, so the source
# side moves with it. monitor host is being decommissioned (Phase 6).

- import_tasks: source.yml
  when: inventory_hostname == 'prod_app'
  tags: [backup, source]

- import_tasks: target.yml
  when: inventory_hostname == 'backup'
  tags: [backup, target]
