# backup role — pg_dump to prod_app's local disk.
#
# Post-2026-07-06 single-host consolidation: the dedicated backup host is
# decommissioned. The dump stays on prod_app (7-day rolling window) and the
# object-storage-upload role ships the newest dump to Cloudflare R2 daily.
# Chain: pg_dump 03:00 UTC → local dir → R2 upload 05:00 UTC.

- import_tasks: dump.yml
  tags: [backup]

# On-demand end-to-end check — never runs on a normal apply. Trigger with:
#   workflow_dispatch: tags=backup-verify, limit=prod_app
- import_tasks: verify.yml
  tags: [never, backup-verify]
