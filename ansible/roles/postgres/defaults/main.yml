# Defaults for the postgres role (monitor host).
# PG 18 from PGDG repo, native systemd unit (no Docker — DB stays bare-metal
# for performance + tuning headroom on the ARM 12GB host).

postgres_db_name: balruno
postgres_db_user: balruno
postgres_data_dir: /var/lib/pgsql/{{ postgres_version }}/data
postgres_unit: "postgresql-{{ postgres_version }}"

# Listen on the VCN private IP — Spring Boot on prod_app (10.0.0.11)
# connects over the same VCN (10.0.0.0/24).
postgres_listen_addresses: "{{ monitor_private_ip }},127.0.0.1"
postgres_port: 5432

# pg_hba access policy. Only the VCN range can connect, scram-sha-256 only.
postgres_hba_entries:
  # Local socket — peer auth for postgres OS user.
  - { type: local, db: all, user: postgres, method: peer }
  # Local TCP loopback — md5 fallback for ad-hoc psql.
  - { type: host,  db: all, user: all,      address: "127.0.0.1/32", method: scram-sha-256 }
  - { type: host,  db: all, user: all,      address: "::1/128",      method: scram-sha-256 }
  # VCN private range — Spring Boot, backup pg_dump puller, etc.
  - { type: host,  db: "{{ postgres_db_name }}", user: "{{ postgres_db_user }}", address: "10.0.0.0/24", method: scram-sha-256 }
  - { type: host,  db: replication, user: replicator, address: "10.0.0.0/24", method: scram-sha-256 }

# Tuning — Stage 0 fail-safe defaults (ADR 0007 v1.1 §3.8).
# Override via group_vars/all/vars.yml when scaling up.
postgres_tunables:
  shared_buffers: "{{ postgres_shared_buffers }}"
  effective_cache_size: "{{ postgres_effective_cache_size }}"
  work_mem: "{{ postgres_work_mem }}"
  maintenance_work_mem: "{{ postgres_maintenance_work_mem }}"
  max_connections: "{{ postgres_max_connections }}"
  # PG 18 async I/O backend. OCI Rocky 9 ships with kernel.io_uring_disabled=2
  # for sandbox safety, so 'io_uring' fails to start. 'worker' uses dedicated
  # PG worker processes to keep IO async without depending on the kernel
  # interface and is the right fit for this environment.
  io_method: "worker"
  io_workers: 3
  wal_level: "replica"
  max_wal_size: "2GB"
  min_wal_size: "256MB"
  checkpoint_completion_target: 0.9
  random_page_cost: 1.1             # SSD-class storage on OCI block volumes.
  effective_io_concurrency: 200
  jit: "off"                        # JIT adds latency on small JSONB queries; revisit at Stage 2+.
  log_min_duration_statement: "500ms"
  log_line_prefix: "%t [%p]: db=%d,user=%u,client=%h "

# Extensions to enable in the balruno DB on first init.
postgres_extensions:
  - pg_stat_statements   # query-level performance tracking, exposed via Grafana
  - pg_trgm              # trigram for full-text-ish search on JSONB content
  - btree_gin            # GIN on btree types — JSONB filter combos

# postgres_exporter — Grafana dashboard metrics. Runs as systemd unit on the
# monitor host alongside PG, scraped by Prometheus over VCN.
postgres_exporter_version: "0.16.0"
postgres_exporter_port: 9187
