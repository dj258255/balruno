# Balruno top-level playbook.
# Source of truth: ADR 0007 v1.1 §3.6 — Ansible automation.
#
# Usage:
#   apply everything:    ansible-playbook -i inventory.yml site.yml
#   single host:         ansible-playbook site.yml --limit prod_app
#   replay one role:     ansible-playbook site.yml --tags nginx
#   reachability check:  ansible -i inventory.yml all -m ping
#
# Roles are enabled progressively: each play below is uncommented in the
# same PR that adds the role's tasks. Until then, leaving them commented
# out keeps `--check` and apply runs green.

# ───────────────────────────────────────────────────────────────────
# 1. Common baseline applied to every host (swap / fail2ban / Docker / SSH).
# ───────────────────────────────────────────────────────────────────
- name: Common setup (all hosts)
  hosts: all
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        # Docker on monitor (Grafana stack) and prod_app (Spring Boot
        # backend container). Backup + status host stay systemd-only.
        common_install_docker: "{{ inventory_hostname in ['monitor', 'prod_app'] }}"

# ───────────────────────────────────────────────────────────────────
# 2. prod-app — Nginx (TLS terminator + reverse proxy).
# spring-boot + hocuspocus roles enabled in Phase B-7 once the JAR + Node
# server are produced. nginx will return 502 Bad Gateway until then —
# that's expected, the gate stays on.
# ───────────────────────────────────────────────────────────────────
- name: Deploy prod-app (backend Docker compose + nginx)
  hosts: prod_app
  become: true
  tags: [prod-app]
  roles:
    - role: backend
      tags: [backend]
    # hocuspocus role enabled in Phase B-5 once the Node sidecar code lives.
    - role: nginx
      tags: [nginx]

# ───────────────────────────────────────────────────────────────────
# 3. monitor — PostgreSQL + Grafana stack + InfluxDB  (Phase B-6 follow-up).
# ───────────────────────────────────────────────────────────────────
- name: Deploy monitor (monitoring stack + Postgres + backup source)
  hosts: monitor
  become: true
  tags: [monitor]
  roles:
    - role: monitoring
      tags: [monitoring]
    - role: postgres
      tags: [postgres]
    - role: backup
      tags: [backup]

# ───────────────────────────────────────────────────────────────────
# 4. backup — pg_dump rsync receiver (+ cloudflared next commit).
# ───────────────────────────────────────────────────────────────────
- name: Deploy backup (rsync receiver + retention + cloudflared)
  hosts: backup
  become: true
  tags: [backup]
  roles:
    - role: backup
      tags: [backup]
    - role: cloudflared
      tags: [cloudflared]

# ───────────────────────────────────────────────────────────────────
# 5. status — Object Storage upload daemon (3-2-1 offsite).
#
# Earlier draft also ran Uptime Kuma here. We dropped that — the Grafana
# stack on monitor (with blackbox_exporter) already covers HTTP/SSL/ping
# probing, Alertmanager handles Discord/Slack, and Grafana 12 Public
# Dashboards covers public status pages. Cloudflare Workers cron handles
# the truly external vantage point. See ADR 0007 v1.2.
# ───────────────────────────────────────────────────────────────────
- name: Deploy status (R2 upload daemon)
  hosts: status
  become: true
  tags: [status]
  roles:
    - role: object-storage-upload
      tags: [object-storage]
