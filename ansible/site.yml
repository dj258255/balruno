# Balruno top-level playbook.
# Source of truth: ADR 0007 v1.1 §3.6 — Ansible automation.
#
# Usage:
#   apply everything:    ansible-playbook -i inventory.yml site.yml
#   replay one role:     ansible-playbook site.yml --tags nginx
#   reachability check:  ansible -i inventory.yml all -m ping
#
# Single-host layout (2026-07-06): everything runs on prod_app. Plays
# target `prod_app` explicitly (not `all`) so the decommission-pending
# backup host is never re-provisioned by an auto-apply.

# ───────────────────────────────────────────────────────────────────
# 1. Common baseline (swap / fail2ban / Docker / SSH).
# ───────────────────────────────────────────────────────────────────
- name: Common setup
  hosts: prod_app
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        common_install_docker: true

# ───────────────────────────────────────────────────────────────────
# 2. Monitoring agent — node_exporter + cadvisor + alloy, scraped by
#    the central Prometheus on the same host.
# ───────────────────────────────────────────────────────────────────
- name: Deploy monitoring agent
  hosts: prod_app
  become: true
  tags: [monitoring-agent]
  roles:
    - role: monitoring-agent
      vars:
        monitoring_agent_deploy_alloy: true

# ───────────────────────────────────────────────────────────────────
# 3. prod-app — Spring + nginx + PostgreSQL + monitoring stack +
#    pg_dump + R2 offsite upload + Cloudflare Tunnel. After the
#    2026-07-06 consolidation this is the only host.
# ───────────────────────────────────────────────────────────────────
- name: Deploy prod-app (app + nginx + PG + monitoring + backup + R2 + tunnel)
  hosts: prod_app
  become: true
  tags: [prod-app]
  roles:
    - role: postgres
      tags: [postgres]
    - role: backend
      tags: [backend]
    - role: nginx
      tags: [nginx]
    - role: monitoring
      tags: [monitoring]
    - role: backup
      tags: [backup]
    - role: object-storage-upload
      tags: [object-storage]
    - role: cloudflared
      tags: [cloudflared]

# ───────────────────────────────────────────────────────────────────
# 4. Factory reset of the decommissioned backup host (one-shot).
#    Never runs on a normal apply — trigger explicitly with
#    workflow_dispatch: tags=factory-reset, limit=backup.
#    Strips everything the common role ever installed (Docker,
#    fail2ban, EPEL, swap, SSH hardening, convenience packages) plus
#    logs and shell history, leaving a near-fresh Rocky 9. SSH stays
#    key-only via the image's cloud-init defaults + rocky's own
#    authorized_keys, which are never touched.
#    Delete this play + the inventory entry after the run.
# ───────────────────────────────────────────────────────────────────
- name: Factory-reset backup host (explicit --tags factory-reset only)
  hosts: backup
  become: true
  tags: [never, factory-reset]
  tasks:
    # ── Docker (engine + repo + data + group) ──
    - name: Stop docker + containerd
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: [docker.socket, docker, containerd]
      failed_when: false

    - name: Remove docker packages
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: absent

    - name: Remove docker group
      ansible.builtin.group:
        name: docker
        state: absent

    # ── fail2ban ──
    - name: Stop fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove fail2ban packages
      ansible.builtin.dnf:
        name: [fail2ban, fail2ban-firewalld, fail2ban-server]
        state: absent

    # ── EPEL (was only needed for fail2ban) ──
    - name: Remove EPEL release
      ansible.builtin.dnf:
        name: epel-release
        state: absent

    # ── Swap (file + fstab + sysctl drop-in) ──
    - name: Disable swap file
      ansible.builtin.command: swapoff /swapfile
      register: reset_swapoff
      changed_when: reset_swapoff.rc == 0
      failed_when: false

    - name: Drop swap entry from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^/swapfile\s'
        state: absent

    - name: Restore default runtime swappiness
      ansible.builtin.command: sysctl -w vm.swappiness=60
      changed_when: true

    # ── SSH hardening drop-in (key-only auth still enforced by the
    #    OCI image's 50-cloud-init.conf; rocky's keys untouched) ──
    - name: Remove SSH hardening drop-in
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/10-balruno-hardening.conf
        state: absent

    - name: Validate sshd config still parses
      ansible.builtin.command: sshd -t
      changed_when: false

    - name: Reload sshd
      ansible.builtin.systemd:
        name: sshd
        state: reloaded

    # ── Convenience packages the common role added (base-system
    #    packages like curl/tar/ca-certificates/chrony/firewalld
    #    are deliberately left alone) ──
    - name: Remove convenience packages
      ansible.builtin.dnf:
        name:
          - bash-completion
          - bind-utils
          - git
          - htop
          - jq
          - lsof
          - net-tools
          - rsync
          - tmux
          - unzip
          - vim-enhanced
          - wget
        state: absent

    - name: Autoremove orphaned dependencies
      ansible.builtin.dnf:
        autoremove: true

    - name: Clean dnf caches
      ansible.builtin.command: dnf clean all
      changed_when: true

    # ── Leftover files, logs, histories ──
    - name: Remove leftover files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /swapfile
        - /etc/sysctl.d/99-balruno.conf
        - /etc/fail2ban
        - /etc/docker
        - /var/lib/docker
        - /var/lib/containerd
        - /var/lib/fail2ban
        - /etc/yum.repos.d/docker-ce.repo
        - /home/rocky/.bash_history
        - /home/rocky/.ssh/known_hosts
        - /root/.bash_history

    - name: Rotate + vacuum journald history
      ansible.builtin.shell: journalctl --rotate && journalctl --vacuum-time=1s
      changed_when: true

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Report final disk/memory state
      ansible.builtin.shell: df -h / | tail -1; free -m | head -2; swapon --show | wc -l
      register: reset_state
      changed_when: false

    - name: Show final state
      ansible.builtin.debug:
        var: reset_state.stdout_lines
