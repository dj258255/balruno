# Balruno top-level playbook.
# Source of truth: ADR 0007 v1.1 §3.6 — Ansible automation.
#
# Usage:
#   apply everything:    ansible-playbook -i inventory.yml site.yml
#   single host:         ansible-playbook site.yml --limit prod_app
#   replay one role:     ansible-playbook site.yml --tags nginx
#   reachability check:  ansible -i inventory.yml all -m ping

# ───────────────────────────────────────────────────────────────────
# 1. Common baseline applied to every host (swap / fail2ban / Docker / SSH).
# ───────────────────────────────────────────────────────────────────
- name: Common setup (all hosts)
  hosts: all
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        # Docker is now required on every host because monitoring-agent
        # (node_exporter + cadvisor + alloy) runs as a Docker compose stack.
        # Memory budget on backup/status (1GB) is tight but the agent
        # itself fits within ~350MB.
        common_install_docker: true

# ───────────────────────────────────────────────────────────────────
# 2. Per-host monitoring agent — node_exporter + cadvisor + alloy.
#    Runs on every host so the central Prometheus (now on prod_app)
#    can scrape.
# ───────────────────────────────────────────────────────────────────
- name: Deploy monitoring agent (all hosts)
  hosts: all
  become: true
  tags: [monitoring-agent]
  roles:
    - role: monitoring-agent
      vars:
        # backup/status are x86 1GB and don't run Docker containers besides
        # the agent itself, so they skip alloy to save memory.
        monitoring_agent_deploy_alloy: "{{ inventory_hostname == 'prod_app' }}"

# ───────────────────────────────────────────────────────────────────
# 3. prod-app — Spring + hocuspocus + nginx + PostgreSQL + monitoring
#    stack + pg_dump source. After the 2026-05-21 consolidation
#    everything compute-heavy lives here.
# ───────────────────────────────────────────────────────────────────
- name: Deploy prod-app (app + collab + nginx + PG + monitoring + backup source)
  hosts: prod_app
  become: true
  tags: [prod-app]
  roles:
    - role: postgres
      tags: [postgres]
    - role: backend
      tags: [backend]
    - role: hocuspocus
      tags: [hocuspocus, collab]
    - role: nginx
      tags: [nginx]
    - role: monitoring
      tags: [monitoring]
    - role: backup
      tags: [backup]

# ───────────────────────────────────────────────────────────────────
# 4. backup — pg_dump rsync receiver + cloudflared tunnel + (TODO Phase 5+)
#    R2 upload daemon.
# ───────────────────────────────────────────────────────────────────
- name: Deploy backup (rsync receiver + retention + cloudflared)
  hosts: backup
  become: true
  tags: [backup]
  roles:
    - role: backup
      tags: [backup]
    - role: cloudflared
      tags: [cloudflared]

# ───────────────────────────────────────────────────────────────────
# 5. status — Object Storage upload daemon (3-2-1 offsite). Kept as
#    a separate x86 1GB micro for now; future cleanup will merge it
#    into backup so the box can be reclaimed too.
# ───────────────────────────────────────────────────────────────────
- name: Deploy status (R2 upload daemon)
  hosts: status
  become: true
  tags: [status]
  roles:
    - role: object-storage-upload
      tags: [object-storage]
