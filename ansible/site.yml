# Balruno 전체 통합 playbook
# 결정: ADR 0007 v1.1 §3.6 Ansible 자동화
#
# 사용법:
#   전체 셋업:        ansible-playbook -i inventory.yml site.yml
#   특정 머신:        ansible-playbook site.yml --limit prod_app
#   특정 role 재실행: ansible-playbook site.yml --tags nginx
#   ping 검증:        ansible -i inventory.yml all -m ping
#
# Roles are enabled progressively: each play below is uncommented in the
# same PR that adds the role's tasks. Until then, leaving them commented
# out keeps `--check` and apply runs green.

# ───────────────────────────────────────────────────────────────────
# 1. 공통 — 4대 모두 (swap / fail2ban / Docker / SSH hardening)
# ───────────────────────────────────────────────────────────────────
- name: Common setup (모든 머신)
  hosts: all
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        # Docker only on monitor (Grafana stack) and status (Uptime Kuma).
        # prod-app + backup run their workloads as plain systemd units.
        common_install_docker: "{{ inventory_hostname in ['monitor', 'status'] }}"

# ───────────────────────────────────────────────────────────────────
# 2. prod-app: Spring Boot + Hocuspocus + Nginx  (Phase B-7)
