# Balruno top-level playbook.
# Source of truth: ADR 0007 v1.1 §3.6 — Ansible automation.
#
# Usage:
#   apply everything:    ansible-playbook -i inventory.yml site.yml
#   replay one role:     ansible-playbook site.yml --tags nginx
#   reachability check:  ansible -i inventory.yml all -m ping
#
# Single-host layout (2026-07-06): everything runs on prod_app. Plays
# target `prod_app` explicitly (not `all`) so the decommission-pending
# backup host is never re-provisioned by an auto-apply.

# ───────────────────────────────────────────────────────────────────
# 1. Common baseline (swap / fail2ban / Docker / SSH).
# ───────────────────────────────────────────────────────────────────
- name: Common setup
  hosts: prod_app
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        common_install_docker: true

# ───────────────────────────────────────────────────────────────────
# 2. Monitoring agent — node_exporter + cadvisor + alloy, scraped by
#    the central Prometheus on the same host.
# ───────────────────────────────────────────────────────────────────
- name: Deploy monitoring agent
  hosts: prod_app
  become: true
  tags: [monitoring-agent]
  roles:
    - role: monitoring-agent
      vars:
        monitoring_agent_deploy_alloy: true

# ───────────────────────────────────────────────────────────────────
# 3. prod-app — Spring + nginx + PostgreSQL + monitoring stack +
#    pg_dump + R2 offsite upload + Cloudflare Tunnel. After the
#    2026-07-06 consolidation this is the only host.
# ───────────────────────────────────────────────────────────────────
- name: Deploy prod-app (app + nginx + PG + monitoring + backup + R2 + tunnel)
  hosts: prod_app
  become: true
  tags: [prod-app]
  roles:
    - role: postgres
      tags: [postgres]
    - role: backend
      tags: [backend]
    - role: nginx
      tags: [nginx]
    - role: monitoring
      tags: [monitoring]
    - role: backup
      tags: [backup]
    - role: object-storage-upload
      tags: [object-storage]
    - role: cloudflared
      tags: [cloudflared]

# ───────────────────────────────────────────────────────────────────
# 4. backup host decommission (2026-07-06 single-host consolidation).
#    Never runs on a normal apply — trigger explicitly with
#    workflow_dispatch: tags=decommission, limit=backup.
#    Removes every balruno artifact (services, data, credentials,
#    cron, users) so the instance can be repurposed. For a factory-
#    fresh OS, terminate + recreate in the OCI console instead.
#    Delete this play + the inventory entry once the wipe has run.
# ───────────────────────────────────────────────────────────────────
- name: Decommission backup host (explicit --tags decommission only)
  hosts: backup
  become: true
  tags: [never, decommission]
  tasks:
    - name: Stop + disable cloudflared
      ansible.builtin.systemd:
        name: cloudflared
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove cloudflared package
      ansible.builtin.dnf:
        name: cloudflared
        state: absent

    - name: Tear down monitoring-agent compose stack
      ansible.builtin.command:
        cmd: docker compose -f /opt/balruno/monitoring-agent/docker-compose.yml down -v --remove-orphans
        removes: /opt/balruno/monitoring-agent/docker-compose.yml
      failed_when: false

    - name: Prune all docker containers/images/volumes/networks
      ansible.builtin.command: docker system prune -af --volumes
      failed_when: false
      changed_when: true

    - name: Remove balruno-backup user (home incl. R2 credentials)
      ansible.builtin.user:
        name: balruno-backup
        state: absent
        remove: true
        force: true

    - name: Remove balruno files, crons, secrets, tooling
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        # cloudflared remnants — the unit file embeds the tunnel token
        - /etc/systemd/system/cloudflared.service
        - /etc/systemd/system/cloudflared-update.service
        - /etc/systemd/system/cloudflared-update.timer
        - /etc/cloudflared
        - /etc/yum.repos.d/cloudflared.repo
        # cron entries
        - /etc/cron.d/balruno-pg-backup-cleanup
        - /etc/cron.d/balruno-r2-upload
        - /etc/cron.d/balruno-pg-backup-push
        # data + logs + installs
        - /var/backups/postgres
        - /var/log/balruno
        - /opt/balruno
        - /opt/aws-cli
        - /usr/local/bin/aws
        - /usr/local/bin/aws_completer
        - /usr/local/bin/balruno-upload.sh

    - name: Strip balruno-injected keys from rocky authorized_keys
      ansible.builtin.lineinfile:
        path: /home/rocky/.ssh/authorized_keys
        # Match only the two ansible-provisioned key comments — never the
        # operator's own OCI key, or we lock ourselves out mid-wipe.
        regexp: 'balruno pg_dump push|balruno-backup uploader'
        state: absent
      failed_when: false

    - name: Reload systemd after unit removals
      ansible.builtin.systemd:
        daemon_reload: true
