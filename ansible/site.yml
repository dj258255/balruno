# Balruno top-level playbook.
# Source of truth: ADR 0007 v1.1 §3.6 — Ansible automation.
#
# Usage:
#   apply everything:    ansible-playbook -i inventory.yml site.yml
#   single host:         ansible-playbook site.yml --limit prod_app
#   replay one role:     ansible-playbook site.yml --tags nginx
#   reachability check:  ansible -i inventory.yml all -m ping
#
# Roles are enabled progressively: each play below is uncommented in the
# same PR that adds the role's tasks. Until then, leaving them commented
# out keeps `--check` and apply runs green.

# ───────────────────────────────────────────────────────────────────
# 1. Common baseline applied to every host (swap / fail2ban / Docker / SSH).
# ───────────────────────────────────────────────────────────────────
- name: Common setup (all hosts)
  hosts: all
  become: true
  tags: [common]
  roles:
    - role: common
      vars:
        # Docker only on monitor (Grafana stack). Other hosts run their
        # workloads as plain systemd units after v1.2 (Uptime Kuma drop).
        common_install_docker: "{{ inventory_hostname == 'monitor' }}"

# ───────────────────────────────────────────────────────────────────
# 2. prod-app — Spring Boot + Hocuspocus + Nginx  (Phase B-7).
# ───────────────────────────────────────────────────────────────────
# - name: Deploy prod-app
#   hosts: prod_app
#   become: true
#   tags: [prod-app]
#   roles:
#     - role: spring-boot
#       tags: [spring-boot]
#     - role: hocuspocus
#       tags: [hocuspocus]
#     - role: nginx
#       tags: [nginx]

# ───────────────────────────────────────────────────────────────────
# 3. monitor — PostgreSQL + Grafana stack + InfluxDB  (Phase B-6 follow-up).
# ───────────────────────────────────────────────────────────────────
- name: Deploy monitor (monitoring stack + Postgres)
  hosts: monitor
  become: true
  tags: [monitor]
  roles:
    - role: monitoring
      tags: [monitoring]
    - role: postgres
      tags: [postgres]

# ───────────────────────────────────────────────────────────────────
# 4. backup — pg_dump rsync receiver + cloudflared (monitor.balruno.com tunnel).
