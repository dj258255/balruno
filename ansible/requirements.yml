# Ansible Galaxy collection dependencies.
# Install:  ansible-galaxy collection install -r requirements.yml
# CI installs these automatically before running playbooks.

collections:
  - name: ansible.posix       # sysctl, mount, firewalld
    version: ">=1.5.4"
  - name: community.general   # timezone, etc.
    version: ">=9.0.0"
  - name: community.docker    # docker_compose_v2 — used by monitoring + uptime-kuma roles
    version: ">=4.0.0"
