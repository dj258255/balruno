# Ansible Galaxy collection dependencies.
# Install:  ansible-galaxy collection install -r requirements.yml
# CI installs these automatically before running playbooks.

collections:
  - name: ansible.posix       # sysctl, mount, firewalld
    version: ">=1.5.4"
  - name: community.general   # timezone, etc.
    version: ">=9.0.0"
  - name: community.docker    # docker_compose_v2 — used by monitoring role
    version: ">=4.0.0"
  - name: community.postgresql # postgresql_db / postgresql_user / postgresql_ext
    version: ">=3.0.0"
  - name: community.crypto    # openssh_keypair — used by object-storage-upload role
    version: ">=2.0.0"
