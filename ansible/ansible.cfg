# Balruno Ansible config.
# ssh_args ControlMaster + pipelining pattern is reused from wikiEngine.

[defaults]
inventory = inventory.yml
# vault_password_file is intentionally not set here — it would need to be a
# host-specific absolute path that breaks portability between developers
# and the GitHub Actions Linux runner. Provide it via the ANSIBLE_VAULT_PASSWORD_FILE
# environment variable instead — see README.md §0 for the rcfile snippet.
# CI publishes it via $GITHUB_ENV in ansible-deploy.yml.
host_key_checking = False
timeout = 60
forks = 4
# Built-in 'default' callback now ships YAML formatting via result_format
# (the previous community.general.yaml callback was removed in 12.0).
stdout_callback = default
result_format = yaml
deprecation_warnings = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_timeout = 60

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
pipelining = true
