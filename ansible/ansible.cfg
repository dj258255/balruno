# Balruno Ansible 설정
# wikiEngine 패턴 차용 (ssh_args ControlMaster + pipelining)

[defaults]
inventory = inventory.yml
# vault_password_file is intentionally not set here — it would need to be a
# host-specific absolute path that breaks portability between local Mac and
# the GitHub Actions Linux runner. Provide it via the ANSIBLE_VAULT_PASSWORD_FILE
# environment variable instead:
#   - Local: add to your shell rcfile
#       export ANSIBLE_VAULT_PASSWORD_FILE=$HOME/Desktop/wikiEngine/ansible/.vault_pass
#   - CI: ansible-deploy.yml writes the secret to a file then publishes the path
#     to the env via $GITHUB_ENV.
host_key_checking = False
timeout = 60
forks = 4
# Built-in 'default' callback now ships YAML formatting via result_format
# (the previous community.general.yaml callback was removed in 12.0).
stdout_callback = default
result_format = yaml
deprecation_warnings = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_timeout = 60

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
pipelining = true
