# Balruno Ansible 설정
# wikiEngine 패턴 차용 (ssh_args ControlMaster + pipelining)

[defaults]
inventory = inventory.yml
vault_password_file = /Users/beomsu/Desktop/wikiEngine/ansible/.vault_pass
host_key_checking = False
timeout = 60
forks = 4
# Built-in 'default' callback now ships YAML formatting via result_format
# (the previous community.general.yaml callback was removed in 12.0).
stdout_callback = default
result_format = yaml
deprecation_warnings = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_timeout = 60

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
pipelining = true
