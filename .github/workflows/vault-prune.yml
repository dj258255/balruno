# One-shot: remove the decommissioned hosts' *_public_ip keys from the
# ansible vault. The vault password only exists as a GH secret, so the
# edit has to happen inside CI. Prints key NAMES only — never values.
# Delete this workflow after it has run once.

name: vault-prune

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ansible-deploy   # serialize with deploys — both touch the repo state
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Ansible
        run: pip install --upgrade 'ansible-core>=2.20,<2.21'

      - name: Prune dead keys from vault
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > /tmp/.vp
          ansible-vault decrypt ansible/group_vars/all/vault.yml \
            --vault-password-file /tmp/.vp --output /tmp/vault-plain.yml
          python3 - << 'PY'
          import re
          path = '/tmp/vault-plain.yml'
          dead = ('monitor_public_ip', 'status_public_ip', 'backup_public_ip')
          kept, removed = [], []
          for line in open(path):
              m = re.match(r'^(\w+):', line)
              if m and m.group(1) in dead:
                  removed.append(m.group(1))
                  continue
              kept.append(line)
          with open(path, 'w') as f:
              f.writelines(kept)
          # key names only — values must never reach stdout
          print('removed keys:', ', '.join(removed) or 'none')
          PY
          ansible-vault encrypt /tmp/vault-plain.yml \
            --vault-password-file /tmp/.vp --output ansible/group_vars/all/vault.yml
          rm -f /tmp/vault-plain.yml /tmp/.vp

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ansible/group_vars/all/vault.yml
          git diff --cached --quiet && { echo "vault unchanged"; exit 0; }
          git commit -m "chore(vault): prune public-ip keys of decommissioned hosts"
          git push
