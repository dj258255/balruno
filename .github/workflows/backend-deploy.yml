# Build the backend Docker image, push to GHCR, deploy to prod_app via
# `docker compose pull && up -d`.
# Triggers:
#   - push to main that touches packages/backend/**
#   - workflow_dispatch (manual rollback / retry)
#
# Decision: ADR 0014 v1.x + this commit's switch from bare JAR + systemd to
# Docker + GHCR. Aligns with self-hosted SaaS standard pattern.
#
# Secrets required:
#   OCI_SSH_PRIVATE_KEY  — same key the Ansible workflow already uses
# GHCR auth uses the workflow's built-in GITHUB_TOKEN with packages: write.
#
# Workflow injection: this file does not consume any untrusted github.event.*
# input in run: blocks, so no escaping concerns.

name: backend-deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/balruno-backend
  PROD_HOST: 168.107.47.33
  PROD_USER: rocky
  INSTALL_DIR: /opt/balruno/backend

jobs:
  build-and-deploy:
    # Native arm64 runner — prod_app is aarch64, so this avoids QEMU
    # emulation (cuts cross-build from ~10 min to ~3 min). Free for public
    # repos; if the repo turns private, swap back to `ubuntu-latest` and
    # restore the `Set up QEMU` step below.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Wait for ansible-deploy
        # ansible-deploy installs Docker on prod_app and renders the
        # /opt/balruno/backend/docker-compose.yml that this workflow's
        # `docker compose pull` will read. Wait for the latest main run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for i in $(seq 1 60); do
            run=$(gh api "/repos/${REPO}/actions/workflows/ansible-deploy.yml/runs?branch=main&per_page=1" --jq '.workflow_runs[0] // empty')
            if [ -z "$run" ]; then
              echo "No ansible-deploy run on main yet — abort"
              exit 1
            fi
            status=$(echo "$run" | jq -r '.status')
            concl=$(echo "$run" | jq -r '.conclusion // "null"')
            sha=$(echo "$run" | jq -r '.head_sha')
            echo "[try ${i}/60] latest ansible-deploy on main: sha=${sha:0:7} status=$status conclusion=$concl"
            if [ "$status" = "completed" ]; then
              [ "$concl" = "success" ] && exit 0 || { echo "abort: ansible-deploy ${concl}"; exit 1; }
            fi
            sleep 20
          done
          echo "ansible-deploy did not reach a terminal state in 20 minutes — abort"
          exit 1

      # No QEMU needed — runner is already arm64.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build + push image (linux/arm64, tags = latest + commit SHA)"
        uses: docker/build-push-action@v6
        with:
          context: packages/backend
          file: packages/backend/Dockerfile
          push: true
          # Native arm64 build on the arm64 runner. mode=max caches every
          # intermediate layer so the multi-stage build (Gradle deps,
          # bootJar, runtime curl install) all benefit on rebuilds.
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH key
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

      - name: Pull image + restart on prod_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          # Login to GHCR on prod_app and pull. rocky was added to the
          # docker group by the backend role.
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              -i ~/.ssh/oci_key \
              "${PROD_USER}@${PROD_HOST}" \
              "echo \"$GH_TOKEN\" | docker login ghcr.io -u \"$ACTOR\" --password-stdin \
               && cd ${INSTALL_DIR} \
               && docker compose pull \
               && docker compose up -d --remove-orphans \
               && sleep 5 \
               && docker compose ps"

      - name: Smoke-test via Cloudflare
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://api.balruno.com/actuator/health || true)
            if [ "$code" = "200" ]; then
              echo "api.balruno.com -> 200 OK after ${i} retries"
              exit 0
            fi
            echo "  retry ${i}/12 — got '${code}', waiting 5s"
            sleep 5
          done
          echo "ERROR: api.balruno.com never returned 200"
          exit 1
