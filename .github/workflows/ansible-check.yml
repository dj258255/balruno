# Ansible dry-run on PRs that touch infra.
# Reports what *would* change without applying anything.
#
# Decision: ADR 0007 v1.1 §3.6 — Ansible automation gated by GitHub Actions
# Secrets required:
#   ANSIBLE_VAULT_PASSWORD  — contents of ~/.vault_pass (decrypts group_vars/vault.yml)
#   OCI_SSH_PRIVATE_KEY     — contents of ~/.ssh/oci_key (rocky@ access to 4 hosts)
#
# This workflow does not consume any untrusted github.event.* input,
# so workflow-injection risk does not apply here.

name: ansible-check

on:
  pull_request:
    branches: [main]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-check.yml'
      - '.github/workflows/ansible-deploy.yml'

concurrency:
  group: ansible-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # runner.* context is only available inside steps, so we publish the
      # vault password file path through $GITHUB_ENV in the prep step below.
      ANSIBLE_HOST_KEY_CHECKING: 'False'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install --upgrade 'ansible-core>=2.20,<2.21'

      - name: Install Galaxy collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH key
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

      - name: Configure vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > "$RUNNER_TEMP/.vault_pass"
          chmod 600 "$RUNNER_TEMP/.vault_pass"
          echo "ANSIBLE_VAULT_PASSWORD_FILE=$RUNNER_TEMP/.vault_pass" >> "$GITHUB_ENV"

      - name: Lint inventory + syntax
        working-directory: ansible
        run: |
          ansible-inventory -i inventory.yml --graph
          ansible-playbook -i inventory.yml site.yml --syntax-check

      - name: Ping all hosts
        working-directory: ansible
        run: ansible -i inventory.yml all -m ping

      - name: Dry run
        working-directory: ansible
        run: ansible-playbook -i inventory.yml site.yml --check --diff
