# Build the Hocuspocus collab Docker image, push to GHCR, and run a
# blue/green cutover on prod_app via the nginx snippet symlink swap
# (ADR 0044). Mirrors backend-deploy.yml.
#
# Triggers:
#   - push to main that touches packages/collab/**
#   - workflow_dispatch (mode = normal | rollback)
#
# Rollback window: ~30s after cutover. The old color is stopped after
# this delay, so an instant `mode=rollback` only works inside that
# window. Past it, redeploy the previous SHA.
#
# Secrets required:
#   OCI_SSH_PRIVATE_KEY  - same key the Ansible workflow already uses
# GHCR auth uses the workflow's built-in GITHUB_TOKEN with packages: write.
#
# Workflow injection: the only event input is `mode`, a typed `choice`
# limited to two enum values. It is fed through the `MODE` env var and
# only ever read as a shell variable inside run blocks.

name: collab-deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/collab/**'
      - '.github/workflows/collab-deploy.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'normal = build + cutover. rollback = flip active back (only within ~30s of cutover).'
        required: false
        default: normal
        type: choice
        options:
          - normal
          - rollback

permissions:
  contents: read
  packages: write

concurrency:
  group: collab-deploy
  cancel-in-progress: false

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/balruno-collab
  PROD_HOST: ${{ secrets.PROD_HOST }}
  PROD_USER: rocky
  INSTALL_DIR: /opt/balruno/collab
  MODE: ${{ github.event.inputs.mode || 'normal' }}
  COLLAB_PORT_INTERNAL: 1234

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Wait for ansible-deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for i in $(seq 1 60); do
            run=$(gh api "/repos/${REPO}/actions/workflows/ansible-deploy.yml/runs?branch=main&per_page=1" --jq '.workflow_runs[0] // empty')
            if [ -z "$run" ]; then
              echo "No ansible-deploy run on main yet — abort"
              exit 1
            fi
            status=$(echo "$run" | jq -r '.status')
            concl=$(echo "$run" | jq -r '.conclusion // "null"')
            sha=$(echo "$run" | jq -r '.head_sha')
            echo "[try ${i}/60] latest ansible-deploy on main: sha=${sha:0:7} status=$status conclusion=$concl"
            if [ "$status" = "completed" ]; then
              [ "$concl" = "success" ] && exit 0 || { echo "abort: ansible-deploy ${concl}"; exit 1; }
            fi
            sleep 20
          done
          echo "ansible-deploy did not reach a terminal state in 20 minutes — abort"
          exit 1

      # Build steps below are skipped on rollback — rollback just flips
      # the nginx symlink and (re)starts the previously running color.

      - name: Set up Docker Buildx
        if: ${{ env.MODE != 'rollback' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ env.MODE != 'rollback' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build + push image (linux/arm64, tags = latest + commit SHA)"
        if: ${{ env.MODE != 'rollback' }}
        uses: docker/build-push-action@v6
        with:
          context: packages/collab
          file: packages/collab/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH key
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

      - name: Blue/green cutover on prod_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
              -i ~/.ssh/oci_key \
              "${PROD_USER}@${PROD_HOST}" \
              MODE="$MODE" GH_TOKEN="$GH_TOKEN" ACTOR="$ACTOR" \
              INSTALL_DIR="$INSTALL_DIR" PORT_INTERNAL="$COLLAB_PORT_INTERNAL" \
              bash -s <<'REMOTE'
          set -euo pipefail

          ACTIVE_LINK=/etc/nginx/conf.d/balruno-collab-active.conf
          SNIPPET_DIR=/etc/nginx/snippets

          # 1. Detect current active color from the nginx active symlink.
          target=$(readlink -f "$ACTIVE_LINK")
          case "$target" in
            *collab-blue.conf)  ACTIVE=blue;  INACTIVE=green ;;
            *collab-green.conf) ACTIVE=green; INACTIVE=blue ;;
            *) echo "ERROR: cannot determine active color from $target"; exit 1 ;;
          esac
          echo "current active=$ACTIVE, target=$INACTIVE, mode=$MODE"

          # Shared internal host port (hocuspocus_internal_host_port=1245) is
          # mapped by BOTH colors in the compose template — docker refuses
          # to start the second container while the first still binds it.
          # The hocuspocus role defaults document this trade-off: the brief
          # WS reconnect window (~5-15s, until the replacement color passes
          # the TCP readiness probe) is acceptable; force-snapshot degrades
          # to best-effort the same way it does during any unconfigured
          # deploy. Both rollback and normal cutover must therefore stop
          # the currently-active color BEFORE bringing the replacement up.

          if [ "$MODE" = "rollback" ]; then
            cd "$INSTALL_DIR"
            COMPOSE_PROFILES="$ACTIVE" docker compose stop "collab-${ACTIVE}"
            sudo ln -sfn "$SNIPPET_DIR/upstream-balruno-collab-${INACTIVE}.conf" "$ACTIVE_LINK"
            sudo nginx -s reload
            COMPOSE_PROFILES="$INACTIVE" docker compose up -d "collab-${INACTIVE}"
            echo "rollback complete: active=${INACTIVE}"
            exit 0
          fi

          # 2. Pull the new image (no container action yet).
          echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
          cd "$INSTALL_DIR"
          docker compose pull "collab-${INACTIVE}"

          # 3. Stop the currently-active color to release the shared
          # internal host port before the replacement starts.
          COMPOSE_PROFILES="$ACTIVE" docker compose stop "collab-${ACTIVE}"
          echo "stopped collab-${ACTIVE} (port 1245 released)"

          # 4. Bring up the replacement color.
          # --remove-orphans cleans up the legacy `balruno-collab`
          # single-service container on the first migration.
          COMPOSE_PROFILES="$INACTIVE" docker compose up -d --remove-orphans "collab-${INACTIVE}"

          # 5. Resolve the host port mapped to the inactive container,
          # then probe TCP reachability (Hocuspocus has no /readiness
          # endpoint; a successful TCP connect means the WS listener is
          # accepting handshakes). Max 60s.
          PORT=$(docker compose port "collab-${INACTIVE}" "$PORT_INTERNAL" | cut -d: -f2)
          if [ -z "$PORT" ]; then
            echo "ERROR: cannot resolve host port for collab-${INACTIVE}"
            docker compose ps
            exit 1
          fi
          echo "polling TCP readiness on 127.0.0.1:${PORT}"
          for i in $(seq 1 20); do
            if (echo > "/dev/tcp/127.0.0.1/${PORT}") 2>/dev/null; then
              echo "ready after ${i} attempts (~$((i*3))s)"
              break
            fi
            if [ "$i" = "20" ]; then
              echo "ERROR: collab-${INACTIVE} did not become reachable in 60s"
              docker compose logs --tail=200 "collab-${INACTIVE}" || true
              docker compose stop "collab-${INACTIVE}" || true
              exit 1
            fi
            sleep 3
          done

          # 6. Cutover: flip active symlink + graceful nginx reload.
          sudo ln -sfn "$SNIPPET_DIR/upstream-balruno-collab-${INACTIVE}.conf" "$ACTIVE_LINK"
          sudo nginx -s reload
          echo "cutover: active=${INACTIVE}"
          REMOTE

      - name: Smoke-test via Cloudflare
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://collab.balruno.com/ || true)
            if [ "$code" = "426" ] || [ "$code" = "200" ]; then
              echo "collab.balruno.com -> ${code} after ${i} retries"
              exit 0
            fi
            echo "  retry ${i}/12 — got '${code}', waiting 5s"
            sleep 5
          done
          echo "ERROR: collab.balruno.com never returned 426/200"
          exit 1
