# Default locale resource bundle — English. Picked when the request's
# Accept-Language header has no specific match. Spring Boot's
# autoconfigured MessageSource loads classpath:messages by default;
# the *_ko.properties / *_en.properties siblings select per locale.
#
# Keys used by backend services (mirrors of user-facing strings the
# client sees in API responses / cloned resource names). Frontend
# carries its own translation table; this file only covers strings
# the server hands back as data.

# Suffix appended when a sheet or doc is duplicated.
# SheetDuplicateService / DocDuplicateApiImpl.
duplicate.suffix= (copy)

# Default project name seeded for a brand-new user (starter pack).
# UserAuthServiceImpl on first OAuth login.
starter.firstProject=My First Game
