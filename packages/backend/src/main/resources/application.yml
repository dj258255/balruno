# Balruno backend default config.
# Profile-specific overrides live in application-<profile>.yml.

spring:
  application:
    name: balruno-backend
  threads:
    virtual:
      enabled: true   # Java 25 virtual threads — Loom-backed scheduler.

  # ─── Datasource ────────────────────────────────────────────────────────
  # All values come from environment variables so the same image works in
  # local-dev, prod, and CI without any application-<profile>.yml secret
  # leaks. .env files (rendered by Ansible in prod, .env locally) are the
  # only place credentials live as plaintext. POSTGRES_* names match the
  # official postgres docker image so a single .env feeds both the DB
  # container and the Spring datasource.
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 1800000   # 30 min — under PG's idle_in_transaction limits
  jpa:
    hibernate:
      # Flyway owns DDL. JPA validates that entity mappings match the
      # schema, but is forbidden from creating/altering tables.
      ddl-auto: validate
    open-in-view: false       # avoid the OSIV antipattern from day 1
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: 8080
  # Bind to 0.0.0.0 inside the container — docker-compose publishes the port
  # as `127.0.0.1:8080:8080`, so external exposure is gated by the host port
  # mapping (Cloudflare → nginx → host 127.0.0.1:8080 → container eth0:8080).
  # Binding to loopback inside the container would only listen on the
  # container's own lo, unreachable from docker-proxy.
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        # prometheus added so the monitor host can scrape JVM / HTTP / Hibernate
        # metrics from /actuator/prometheus (Spring Actuator + Micrometer).
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      app: balruno-backend
    distribution:
      # Enable percentile histograms so http_server_requests_seconds reports
      # p50/p95/p99 directly — needed for virtual thread A/B comparisons.
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

info:
  app:
    name: Balruno Backend
    license: AGPL-3.0-or-later
    repo: https://github.com/dj258255/balruno

# ─── Spring Security OAuth2 client ───────────────────────────────────────
# We are simultaneously a CLIENT (offering "Sign in with GitHub/Google")
# and an ISSUER of our own JWTs to our own frontend / desktop. Spring
# handles the inbound OAuth flow; our JwtIssuer handles outbound tokens.
spring.security.oauth2.client.registration.github:
  client-id: ${GITHUB_OAUTH_CLIENT_ID}
  client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
  scope:
    - read:user
    - user:email
spring.security.oauth2.client.registration.google:
  client-id: ${GOOGLE_OAUTH_CLIENT_ID}
  client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
  scope:
    - openid
    - profile
    - email

# ─── Self-issued JWT settings ────────────────────────────────────────────
# RS256 (ADR 0002 v1.2). PEM-encoded RSA key pair shared with the collab
# JWT issuer/verifier — audience claim distinguishes the two surfaces.
# Hocuspocus only receives the public key, so a verifier-side leak can't
# forge tokens.
balruno.jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  issuer: https://api.balruno.com
  access-token-ttl: PT15M
  refresh-token-ttl: P7D
  cookie-name: balruno_session
  # No leading dot — RFC 6265 (2011) deprecated the historical leading-dot
  # form, and Tomcat 11's Rfc6265CookieProcessor rejects it outright. The
  # browser still sends the cookie to api.* and app.* alike when Domain is
  # the apex domain.
  cookie-domain: balruno.com
  # Frontend lives at the apex (balruno.com on Vercel) for now. The
  # subdomain split (app.* / docs.* / etc.) lands when the marketing
  # surface separates from the application UI.
  frontend-redirect-base: https://balruno.com

# ─── Collab token (Hocuspocus session) ───────────────────────────────────
# Same RSA key as balruno.jwt above (ADR 0002 v1.2) — audience claim
# distinguishes a collab token from an API token. Hocuspocus verifies
# with the public half only.
balruno.collab.token:
  ttl: PT15M
  audience: balruno-collab

# Internal HTTP channel from Spring → Hocuspocus side-car. Used by
# DocDuplicateApiImpl to force-flush the live yjs state before reading
# documents.ydoc_state for a clone (otherwise the clone may lag the
# last onStoreDocument throttle window). Loopback only; don't expose.
balruno.collab.sidecar:
  url: ${COLLAB_INTERNAL_URL:http://127.0.0.1:1235}
  secret: ${COLLAB_INTERNAL_SECRET:}
  timeout: PT2S

# ─── CORS allowed origins ────────────────────────────────────────────────
# allowCredentials=true (we send the session cookie) rules out wildcard,
# so origins are enumerated. Self-host operators override via env:
#   BALRUNO_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS_0=https://my.example.com
# or a YAML list in application-<profile>.yml.
balruno.security.cors:
  allowed-origin-patterns:
    - https://*.balruno.com
    - https://balruno.com
    - http://localhost:*
    - http://127.0.0.1:*

# ─── Storage (Phase B — StorageService + /media/*) ──────────────────────
# Baserow pattern: same /media/* URL whether the bytes live on disk
# (self-host default) or in R2 (cloud SaaS). Operator picks one via
# BALRUNO_STORAGE; r2 mode also requires the BALRUNO_R2_* quartet.
balruno.storage:
  backend: ${BALRUNO_STORAGE:local}
  local-dir: ${BALRUNO_DATA_DIR:/var/lib/balruno/media}
  r2:
    endpoint: ${BALRUNO_R2_ENDPOINT:}
    bucket: ${BALRUNO_R2_BUCKET:}
    access-key: ${BALRUNO_R2_ACCESS_KEY:}
    secret-key: ${BALRUNO_R2_SECRET_KEY:}

# Multipart upload caps — UploadController validates again at the
# request layer so a hostile client can't sneak past these.
spring.servlet.multipart:
  max-file-size: 2MB
  max-request-size: 4MB

# ─── springdoc / OpenAPI ─────────────────────────────────────────────────
springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui.path: /swagger-ui.html
  show-actuator: false
