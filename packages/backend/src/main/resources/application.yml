# Balruno backend default config.
# Profile-specific overrides live in application-<profile>.yml.

spring:
  application:
    name: balruno-backend
  threads:
    virtual:
      enabled: true   # Java 25 virtual threads — ADR 0006 v1.2

server:
  port: 8080
  # Bind to 0.0.0.0 inside the container — docker-compose publishes the port
  # as `127.0.0.1:8080:8080`, so external exposure is gated by the host port
  # mapping (Cloudflare → nginx → host 127.0.0.1:8080 → container eth0:8080).
  # Binding to loopback inside the container would only listen on the
  # container's own lo, unreachable from docker-proxy.
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Balruno Backend
    license: AGPL-3.0-or-later
    repo: https://github.com/dj258255/balruno
